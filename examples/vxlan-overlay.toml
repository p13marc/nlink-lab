# VXLAN overlay topology.
#
# Two VTEPs connected by an underlay link, each hosting a VXLAN
# interface (VNI 100) for the overlay network.

[lab]
name = "vxlan-overlay"
description = "VXLAN overlay between two VTEPs"

[profiles.router]
sysctls = { "net.ipv4.ip_forward" = "1" }

# ── VTEPs ───────────────────────────────────────────

[nodes.vtep1]
profile = "router"

[nodes.vtep1.interfaces.vxlan100]
kind = "vxlan"
vni = 100
local = "10.0.0.1"
remote = "10.0.0.2"
port = 4789
addresses = ["192.168.100.1/24"]

[nodes.vtep2]
profile = "router"

[nodes.vtep2.interfaces.vxlan100]
kind = "vxlan"
vni = 100
local = "10.0.0.2"
remote = "10.0.0.1"
port = 4789
addresses = ["192.168.100.2/24"]

# ── Underlay link ──────────────────────────────────

[[links]]
endpoints = ["vtep1:eth0", "vtep2:eth0"]
addresses = ["10.0.0.1/24", "10.0.0.2/24"]
