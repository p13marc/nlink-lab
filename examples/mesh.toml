# Full mesh topology: 4 nodes fully interconnected.
#
#   n1 ──── n2
#   │ \   / │
#   │  \ /  │
#   │   X   │
#   │  / \  │
#   │ /   \ │
#   n3 ──── n4
#
# Every node can reach every other node directly.
# 4 nodes = 6 links (N*(N-1)/2).

[lab]
name = "mesh"
description = "Full mesh of 4 nodes"

[nodes.n1]
[nodes.n2]
[nodes.n3]
[nodes.n4]

[[links]]
endpoints = ["n1:eth0", "n2:eth0"]
addresses = ["10.1.2.1/30", "10.1.2.2/30"]

[[links]]
endpoints = ["n1:eth1", "n3:eth0"]
addresses = ["10.1.3.1/30", "10.1.3.2/30"]

[[links]]
endpoints = ["n1:eth2", "n4:eth0"]
addresses = ["10.1.4.1/30", "10.1.4.2/30"]

[[links]]
endpoints = ["n2:eth1", "n3:eth1"]
addresses = ["10.2.3.1/30", "10.2.3.2/30"]

[[links]]
endpoints = ["n2:eth2", "n4:eth1"]
addresses = ["10.2.4.1/30", "10.2.4.2/30"]

[[links]]
endpoints = ["n3:eth2", "n4:eth2"]
addresses = ["10.3.4.1/30", "10.3.4.2/30"]
