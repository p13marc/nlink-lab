# Firewall topology.
#
# A server behind a stateful firewall that only allows established
# connections, ICMP, and TCP port 8080. A client and an attacker
# node test access.

[lab]
name = "firewall"
description = "Server with stateful nftables firewall"

[profiles.router]
sysctls = { "net.ipv4.ip_forward" = "1" }

# ── Nodes ───────────────────────────────────────────

[nodes.router]
profile = "router"

[nodes.client]

[nodes.client.routes]
default = { via = "10.0.1.1" }

[nodes.server]

[nodes.server.routes]
default = { via = "10.0.2.1" }

[nodes.server.firewall]
policy = "drop"

[[nodes.server.firewall.rules]]
match = "ct state established,related"
action = "accept"

[[nodes.server.firewall.rules]]
match = "tcp dport 8080"
action = "accept"

[[nodes.server.firewall.rules]]
match = "udp dport 53"
action = "accept"

# ── Links ───────────────────────────────────────────

[[links]]
endpoints = ["router:eth0", "client:eth0"]
addresses = ["10.0.1.1/24", "10.0.1.10/24"]

[[links]]
endpoints = ["router:eth1", "server:eth0"]
addresses = ["10.0.2.1/24", "10.0.2.10/24"]
