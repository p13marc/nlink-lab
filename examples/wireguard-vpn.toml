# WireGuard VPN topology.
#
# Two sites connected by a WireGuard tunnel over a simulated WAN link.
# Each site has a gateway with a WireGuard interface. The underlay link
# has 50ms delay to simulate internet latency. The overlay provides
# encrypted connectivity between the 192.168.x.0/24 subnets.

[lab]
name = "wireguard-vpn"
description = "Site-to-site WireGuard VPN over WAN"

# ── Profiles ────────────────────────────────────────

[profiles.gateway]
sysctls = { "net.ipv4.ip_forward" = "1" }

# ── Site A gateway ─────────────────────────────────

[nodes.gw-a]
profile = "gateway"

[nodes.gw-a.wireguard.wg0]
private_key = "auto"
listen_port = 51820
addresses = ["192.168.255.1/32"]
peers = ["gw-b"]

[nodes.gw-a.routes]
"192.168.2.0/24" = { dev = "wg0" }

# ── Site B gateway ─────────────────────────────────

[nodes.gw-b]
profile = "gateway"

[nodes.gw-b.wireguard.wg0]
private_key = "auto"
listen_port = 51820
addresses = ["192.168.255.2/32"]
peers = ["gw-a"]

[nodes.gw-b.routes]
"192.168.1.0/24" = { dev = "wg0" }

# ── Site A host ────────────────────────────────────

[nodes.host-a]

[nodes.host-a.routes]
default = { via = "192.168.1.1" }

# ── Site B host ────────────────────────────────────

[nodes.host-b]

[nodes.host-b.routes]
default = { via = "192.168.2.1" }

# ── WAN link (underlay between gateways) ───────────

[[links]]
endpoints = ["gw-a:eth0", "gw-b:eth0"]
addresses = ["10.0.0.1/30", "10.0.0.2/30"]

# ── LAN links (gateway ↔ host) ─────────────────────

[[links]]
endpoints = ["gw-a:eth1", "host-a:eth0"]
addresses = ["192.168.1.1/24", "192.168.1.10/24"]

[[links]]
endpoints = ["gw-b:eth1", "host-b:eth0"]
addresses = ["192.168.2.1/24", "192.168.2.10/24"]

# ── WAN impairment ─────────────────────────────────

[impairments."gw-a:eth0"]
delay = "50ms"
jitter = "5ms"
loss = "0.1%"
