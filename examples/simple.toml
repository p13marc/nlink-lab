# Simple 2-node topology for testing.
#
# Creates two namespaces connected by a veth pair with addresses
# and a 10ms delay on one end.

[lab]
name = "simple"
description = "Minimal two-node lab"

[profiles.router]
sysctls = { "net.ipv4.ip_forward" = "1" }

[nodes.router]
profile = "router"

[nodes.router.routes]
"10.0.0.0/8" = { via = "10.0.0.2" }

[nodes.host]

[nodes.host.routes]
default = { via = "10.0.0.1" }

[[links]]
endpoints = ["router:eth0", "host:eth0"]
addresses = ["10.0.0.1/24", "10.0.0.2/24"]

[impairments."router:eth0"]
delay = "10ms"
jitter = "2ms"
