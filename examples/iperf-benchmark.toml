# iperf3 benchmark topology.
#
# Two nodes connected by a rate-limited link. Server runs iperf3,
# client can connect to measure throughput.
#
# Usage after deploy:
#   nlink-lab exec iperf-bench client -- iperf3 -c 10.0.0.1 -t 5

[lab]
name = "iperf-bench"
description = "Two nodes for throughput benchmarking"

[nodes.server]

[nodes.server.routes]
default = { via = "10.0.0.2" }

[nodes.client]

[nodes.client.routes]
default = { via = "10.0.0.1" }

[[links]]
endpoints = ["server:eth0", "client:eth0"]
addresses = ["10.0.0.1/24", "10.0.0.2/24"]

# ── Rate limiting ──────────────────────────────────

[rate_limits."server:eth0"]
egress = "100mbit"
ingress = "100mbit"

[rate_limits."client:eth0"]
egress = "100mbit"
ingress = "100mbit"
