# VRF multi-tenant topology.
#
# A PE (provider edge) router with two VRFs isolating tenant traffic.
# Tenant A (VRF "red", table 10) and Tenant B (VRF "blue", table 20)
# each have a host connected to the PE via separate interfaces.
# Traffic between tenants is fully isolated at the routing level.

[lab]
name = "vrf-multitenant"
description = "PE router with VRF tenant isolation"

# ── Profiles ────────────────────────────────────────

[profiles.router]
sysctls = { "net.ipv4.ip_forward" = "1" }

# ── PE Router ──────────────────────────────────────

[nodes.pe]
profile = "router"

[nodes.pe.vrfs.red]
table = 10
interfaces = ["eth1"]

[nodes.pe.vrfs.red.routes]
default = { dev = "eth1" }

[nodes.pe.vrfs.blue]
table = 20
interfaces = ["eth2"]

[nodes.pe.vrfs.blue.routes]
default = { dev = "eth2" }

# ── Tenant A host ─────────────────────────────────

[nodes.tenant-a]

[nodes.tenant-a.routes]
default = { via = "10.10.0.1" }

# ── Tenant B host ─────────────────────────────────

[nodes.tenant-b]

[nodes.tenant-b.routes]
default = { via = "10.20.0.1" }

# ── Links ──────────────────────────────────────────

[[links]]
endpoints = ["pe:eth1", "tenant-a:eth0"]
addresses = ["10.10.0.1/24", "10.10.0.10/24"]

[[links]]
endpoints = ["pe:eth2", "tenant-b:eth0"]
addresses = ["10.20.0.1/24", "10.20.0.10/24"]
