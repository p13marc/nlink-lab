# Container topology: an Alpine container connected to a bare namespace host.
#
#   router (container)  ──── host (namespace)
#   alpine:latest          10.0.0.1    10.0.0.2
#
# Demonstrates mixed topology: the router node is deployed as a Docker/Podman
# container with --network=none, while the host is a bare namespace.
# All networking is managed by nlink-lab regardless of node type.

[lab]
name = "container"
description = "Container node connected to bare namespace"

[nodes.router]
image = "alpine:latest"
cmd = ["sleep", "infinity"]

[nodes.host]

[nodes.host.routes]
default = { via = "10.0.0.1" }

[[links]]
endpoints = ["router:eth0", "host:eth0"]
addresses = ["10.0.0.1/24", "10.0.0.2/24"]
